<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chatbot</title>
</head>
<body>
  <div class="js-container"></div>
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">

    function ChatInput(){
      return(
        <>
          <input placeholder="Send a Message to Chatbot" size="30"/>
          <button>send</button>
        </>
      );
    }
    function ChatMessage({message, image}){
      // const {message,image}=props//destructuring
      // const image =props.image

      // if(image=== "images/user"){//for profile pic of robot before text
      //   return(
      //     <div>
      //       {message}
      //     <img src={`${image}.png`} alt="" width="40"/>
      //     </div>
      //   )
      // }
      return(
        <div>
          {image === 'images/robot' && <img src={`${image}.png`} alt="" width="40"/>}
          {message}
          {image === "images/user" && <img src="images/user.png" alt="user" width="40" />}
        </div>
      )
    }

    function App(){
      return(
      <>
        <ChatInput/>
        {/*ChatInput()*/}
        <ChatMessage message="Hello Chatbot" image="images/user"/>
        <ChatMessage message="How can i Help you?" image="images/robot"/>
        <ChatMessage message= "Can you get me todays date?" image="images/user"/>
        <ChatMessage message="Today is september 11 2001" image="images/robot"/>
      </>
      )
    }
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App/>);
  </script>
</body>
</html>
