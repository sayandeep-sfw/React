<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
</head>
<body>
  <div class="js-container"></div>
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">
    const totalcost=(8*2)+10;
    const ship=5;
    const total=ship+totalcost
    const date = dayjs().format('MMMM, D');
    const time = dayjs().format('HH,mm,ss');
    const div = (
    <div>
    {/* <p>Real slim shady</p> */}
    {/* <button>Good job</button> */}
    <p>Cotton socks</p>
    <p>Price $10</p>
    <p>t-shirt</p>
    <p>Price 8$</p>
    <button>Add to cart</button>
    <p>Total Price of items {totalcost}</p>
    <p>Shipping cost {ship}</p>
    <p>Total cost {total}</p>
    <p>Todays date {date}</p>
    <p>Clobbering time {time}</p>
    </div>
  );
    
    const container = document.querySelector('.js-container');
    const root=ReactDOM.createRoot(container);
    root.render(div);

    setInterval(() => {
        const div = <p>Current time: {dayjs().format('HH:mm:ss')}</p>;
        root.render(div);
      }, 1000);
  </script>
</body>
</html>
