<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function App() {
        const [count, setCount] = React.useState(0);
        const [isAutoClicking, setIsAutoClicking] = React.useState(false); // new state
        const buttonRef = React.useRef(null);
        const intervalRef = React.useRef(null);

        function increaseCount() {
          setCount((c) => c + 1);
        }

        function reset() {
          setCount(0);
        }

        function autoClick() {
          if (intervalRef.current) {
            clearInterval(intervalRef.current);
            intervalRef.current = null;
            setIsAutoClicking(false);
          } else {
            intervalRef.current = setInterval(() => {
              if (buttonRef.current) {
                buttonRef.current.click();
              }
            }, 1000);
            setIsAutoClicking(true);
          }
        }

        React.useEffect(() => {
          // cleanup when component unmounts
          return () => {
            if (intervalRef.current) {
              clearInterval(intervalRef.current);
            }
          };
        }, []);

        return (
          <>
            <button onClick={increaseCount} ref={buttonRef}>
              Clicked {count} {count === 1 ? "time" : "times"}
            </button>
            <button onClick={reset}>Reset</button>
            <button onClick={autoClick}>
              {isAutoClicking ? "Stop Auto Click" : "Start Auto Click"}
            </button>
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
