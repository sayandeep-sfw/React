<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chatbot</title>
</head>
<body>
  <div class="js-container"></div>
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
  <script type="text/babel">

    function ChatInput({chatMessages,setChatMessages}){
      const[inputText, setInputText]=React.useState('');
      function saveInputText(event){
        setInputText(event.target.value);
      }
      function sendMessage(){
        const newChatmessages = [
          ...chatMessages,
          {
          message: inputText,
          sender:'images/user',
          id: crypto.randomUUID()
          }
        ]
        setChatMessages(newChatmessages);

        const response = Chatbot.getResponse(inputText);
        setChatMessages([
          ...newChatmessages,
          {
          message: response,
          sender:'images/robot',
          id: crypto.randomUUID()
          }
        ]);
        setInputText('');
      }
      return(
        <>
          <input placeholder="Send a Message to Chatbot" size="30" onChange={saveInputText} value={inputText}/>
          <button onClick={sendMessage} >send</button>
        </>
      );
    }
    function ChatMessage({message, sender}){
      
      // const {message,image}=props//destructuring
      // const image =props.image

      // if(image=== "images/user"){//for profile pic of robot before text
      //   return(
      //     <div>
      //       {message}
      //     <img src={`${image}.png`} alt="" width="40"/>
      //     </div>
      //   )
      // }
      const image = sender;
      return(
        <div>
          {image === 'images/robot' && <img src={`${image}.png`} alt="" width="40"/>}
          {message}
          {image === "images/user" && <img src="images/user.png" alt="user" width="40" />}
        </div>
      )
    }

    function ChatMessages({chatMessages}){
      return(
        <>
          {chatMessages.map((chatMessage)=>{
          return(
            <ChatMessage message={chatMessage.message} sender={chatMessage.sender} key={chatMessage.id}/>
          )
        })}
        </>
      )

    }

    function App(){
      const [chatMessages,setChatMessages]=React.useState(
        [
          {
            message:"Hello Chatbot",
            sender:"images/user",
            id: 'id1'
          },
          {
            message:"How can i Help you?",
            sender:"images/robot",
            id: 'id2'
          },
          {
            message:"Can you get me todays date?",
            sender:"images/user",
            id: 'id3'
          },
          {
            message:"oday is september 11 2001",
            sender:"images/robot",
            id: 'id4'
          }
        ]
      )
      return(
      <>
        <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages}/>
        {/*ChatInput()*/}
        <ChatMessages chatMessages={chatMessages}/>
      </>
      )
    }
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App/>);
  </script>
</body>
</html>
