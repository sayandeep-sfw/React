<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chatbot</title>
  <style>
    .body{
      margin-top: 0px;
      margin-bottom: 0px;
      font-family: Arial;
    }
    .send-button{
      color: white;
      padding: 12px 20px;
      background-color: rgb(25,135,85);
      border-radius: 10px;
      margin-left: 10px;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }
    .chat-input{
      padding: 12px 15px;
      border-radius: 10px;
      border-width:1px;
      font-size: 15px;
      flex-grow: 1;
    }
    .chat-input-container{
      display: flex;
      margin-bottom: 60px;

    }
    .app-container{
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      height: 100vh;
      display: flex;
      flex-direction:column;
    }
    .chat-message-user{
      display: flex;
      justify-content: end;
      align-items: start;
    }
    .chat-message-robot{
      display: flex;
      justify-content: start;
      align-items: start;
    }
    .chat-message-text{
      background-color: rgb(238, 238, 238);
      padding: 15px 20px;
      border-radius: 10px;
      margin-right: 10px;
      margin-left: 10px;
      margin-bottom: 20px;
      max-width: 300px;
    }
    .chat-message-profile{
      width: 45px;
    }
    .chat-messages-container{
      flex-grow: 1;
      margin-top: 20px;
      overflow: scroll;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .welcome-message {
        color: rgb(120, 120, 120);
        text-align: center;
      }
       .loading-spinner {
        height: 40px;
        margin: -15px;
      }
  </style>
</head>
<body>
  <div class="js-container"></div>
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
  <script type="text/babel">

    function ChatInput({chatMessages,setChatMessages}){
      const [inputText, setInputText]=React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);
      function saveInputText(event){
        setInputText(event.target.value)
      }
      async function sendMessage(){
         if (isLoading || inputText === '') {
            return;
          }
        setIsLoading(true);
        const newChatmessage=
        [
          ...chatMessages,
          {
          message:inputText,
          sender:'user',
          id: crypto.randomUUID()
          }

        ]
        setChatMessages(newChatmessage)

        setChatMessages([
          ...newChatmessage,
          {
          message:<img src="images/loading-spinner.gif" alt="loading" className="loading-spinner"/>,
          sender:'robot',
          id: crypto.randomUUID()
          }

        ])
        setInputText('Loading');
        const respose=await Chatbot.getResponseAsync(inputText)
        setChatMessages([
          ...newChatmessage,
          {
          message:respose,
          sender:'robot',
          id: crypto.randomUUID()
          }

        ])
        setInputText('');
        setIsLoading(false);
    }
      function enter(event){
        if(event.key === 'Enter'){
          sendMessage();
        }
        if(event.key === 'Escape'){
          setInputText('');
        }
      }
      return(
        <>
        <div className="chat-input-container">
          <input className="chat-input" size="30" placeholder="Send a Message to Chatbot" 
          onChange={saveInputText} value={inputText} onKeyDown={enter}/>
          <button className="send-button" onClick={sendMessage}>send</button>
        </div>
        </>
      );
    }
    function ChatMessage({message, sender}){
      return(
        <div className={sender==='user'?'chat-message-user':'chat-message-robot'}> 
          {sender === 'robot' && <img src="images/robot.png" alt="" className="chat-message-profile"/>}
          <div className="chat-message-text">{message}</div>
          {sender === "user" && <img src="images/user.png" alt="user" className="chat-message-profile" />}
        </div>
      )
    }
    function ChatMessages({chatMessages}){
      const chatMessagesRef=React.useRef(null);
      React.useEffect(()=>{
        const containerElement = chatMessagesRef.current;
        if(containerElement){
          containerElement.scrollTop = containerElement.scrollHeight;
        }
      },[chatMessages])
      return(
        <div className="chat-messages-container" ref={chatMessagesRef}>
        {chatMessages.map((chatMessage)=>{
        return(
          <ChatMessage
            message = {chatMessage.message}
            sender ={chatMessage.sender}
            key={chatMessage.id}
          />
        )
        })}
        </div>
      )

    }

    function App(){
      const [chatMessages,setChatMessages]=React.useState(
      []
    )
      return(
      <>
      <div className="app-container">
      {chatMessages.length === 0 && (
      <p className="welcome-message">
        Welcome to the chatbot project! Send a message using the textbox below.
      </p>
      )}
      <ChatMessages chatMessages={chatMessages}/>
      <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages}/>
      </div>
      </>
      )
    }
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App/>);
  </script>
</body>
</html>
