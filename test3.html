<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chatbot</title>
  <style>
    body{
      font-family: Arial;
      margin-top: 0px;
      margin-bottom: 0px;
    }
    .send-button{
      background-color: rgb(25, 135, 84);
      color: white;
      padding: 12px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    .chat-input{
      padding: 12px 15px;
      border-radius: 10px;
      border-width: 1px;
      font-size: 15px;
      flex-grow: 1;
      
    }
    .chat-input-container{
      display: flex;
      margin-bottom: 60px;
    }
    .app-container{
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .chat-message-user{
      display: flex;
      justify-content: end;
      align-items: start;
    }
    .chat-message-robot{
      display: flex;
      justify-content: start;
      align-items: start;
    }
    .chat-message-text{
      background-color: rgb(238, 238, 238);
      padding: 15px 20px;
      border-radius: 10px;
      margin-right: 10px;
      margin-left: 10px;
      margin-bottom: 20px;
      min-width: 300px;
    }
    .chat-message-profile{
      width: 45px;
    }
    .chat-messages-container{
      flex-grow: 1;
      margin-top: 20px;
      overflow: scroll;
    }
  </style>
</head>
<body>
  <div class="js-container"></div>
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
  <script type="text/babel">

    function ChatInput({chatMessages,setChatMessages}){
      const[inputText, setInputText]=React.useState('');
      function saveInputText(event){
        setInputText(event.target.value);
      }
      function sendMessage(){
        const newChatmessages = [
          ...chatMessages,
          {
          message: inputText,
          sender:'images/user',
          id: crypto.randomUUID()
          }
        ]
        setChatMessages(newChatmessages);

        const response = Chatbot.getResponse(inputText);
        setChatMessages([
          ...newChatmessages,
          {
          message: response,
          sender:'images/robot',
          id: crypto.randomUUID()
          }
        ]);
        setInputText('');
        
      }
      return(
        <div className="chat-input-container">
          <input className="chat-input" placeholder="Send a Message to Chatbot" size="30" onChange={saveInputText} value={inputText}/>
          <button className="send-button" onClick={sendMessage} >send</button>
        </div>
      );
    }
    function ChatMessage({message, sender}){
      
      // const {message,image}=props//destructuring
      // const image =props.image

      // if(image=== "images/user"){//for profile pic of robot before text
      //   return(
      //     <div>
      //       {message}
      //     <img src={`${image}.png`} alt="" width="40"/>
      //     </div>
      //   )
      // }
      const image = sender;
      return(
        <div className={image === 'images/robot'?"chat-message-robot":"chat-message-user"}>
          {image === 'images/robot' && <img src={`${image}.png`} alt="" className="chat-message-profile"/>}
          <div className="chat-message-text">
            {message}
          </div>
          {image === "images/user" && <img src="images/user.png" alt="user" className="chat-message-profile" />}
        </div>
      )
    }

    function ChatMessages({chatMessages}){
      const chatMessagesRef = React.useRef(null);
      React.useEffect(()=>{
        const containerElem=chatMessagesRef.current
        if(containerElem){
          containerElem.scrollTop = containerElem.scrollHeight
        }
      },[chatMessages]);
      return(
        <div className="chat-messages-container" ref={chatMessagesRef}>
          {chatMessages.map((chatMessage)=>{
          return(
            <ChatMessage message={chatMessage.message} sender={chatMessage.sender} key={chatMessage.id}/>
          )
        })}
        </div>
      )

    }

    function App(){
      const [chatMessages,setChatMessages]=React.useState(
        [
          {
            message:"Hello Chatbot",
            sender:"images/user",
            id: 'id1'
          },
          {
            message:"How can i Help you?",
            sender:"images/robot",
            id: 'id2'
          },
          {
            message:"Can you get me todays date?",
            sender:"images/user",
            id: 'id3'
          },
          {
            message:"Today is september 11 2001",
            sender:"images/robot",
            id: 'id4'
          }
        ]
      )
      return(
      <div className="app-container">
        {/*ChatInput()*/}
        <ChatMessages chatMessages={chatMessages}/>
        <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages}/>
      </div>
      )
    }
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App/>);
  </script>
</body>
</html>
